<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <title>/</title>

        <style>
            body {
                margin: 0;
                padding: 0;
            }
            footer {
                margin: 0;
                padding: 0;
            }
            header {
                margin: 0;
                padding: 0;
            }
            h1 {
                margin: 0;
                padding: 0;
            }
            h2 {
                margin: 0;
                padding: 0;
            }
            .centered-container {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 2560px;
                display: flex;
                justify-content:flex-start;
                align-items: center;
                flex-direction: column;
            }
            .main-container {
                margin: 0;
                padding: 0;
                width: 80%;
                height: 100%;
                background-color: darkgray;
            }
            .padding-container {
                margin: 0;
                padding: 10px 20px 10px 20px;
            }
            .footer-container {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 300px;
                background-color: black;
                color: white;
            }
            .header-container {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 125px;
                background-color: burlywood;
                color: white;
            }
            .cube {
                margin: 0;
                padding: 0;
                width: 50px;
                height: 50px;
                position: relative;
                background-color: blue;
            }
            .font-white {
                color: white;
            }
        </style>

        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="centered-container">
            <header class="header-container">
                <div class="padding-container">
                    <h2>header</h2>
                </div>
            </header>
            <div class="main-container">
                <div class="padding-container">
                    <h1>/</h1>
                    <div class="cube" id="cube">
                        <h1 class="font-white">kek</h1>
                    </div>
                </div>
            </div>            
            <footer class="footer-container">
                <div class="padding-container">
                    <h2>footer</h2>
                </div>
            </footer>
        </div>

        <script defer src="js/script.js"></script>
    </body>
</html>
